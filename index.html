let lang='ru', activeFilter='all';

function setSwitchFlag(){
  const s=document.getElementById('langSwitch');
  s.classList.remove('flag-ru','flag-uk');
  s.classList.add(lang==='uk'?'flag-uk':'flag-ru');
}
function positionPill(instant){
  const pill=document.getElementById('pill');
  const a=document.querySelector('.chip.active');
  if(!a)return;
  if(instant)pill.style.transition='none';
  pill.style.width=a.offsetWidth+'px';
  pill.style.transform='translateX('+a.offsetLeft+'px)';
  if(instant)requestAnimationFrame(()=>{pill.style.transition='';});
}
function applyLang(){
  const t=i18n[lang];
  document.documentElement.lang=lang;
  document.getElementById('search').placeholder=t.search;
  document.getElementById('curLang').textContent=t.code;
  document.getElementById('langSwitch').title=t.switch;
  const c=document.querySelectorAll('.chip');
  c[0].textContent=t.all;c[1].textContent=t.fine;c[2].textContent=t.severe;
  setSwitchFlag();render();
  requestAnimationFrame(()=>positionPill(true));
}
function pickLang(l){
  lang=l;applyLang();
  const g=document.getElementById('gate');
  g.classList.add('hide');
  setTimeout(()=>{
    g.style.display='none';
    g.classList.remove('anim'); /* .anim снят → ВСЕ анимации в #gate останавливаются по CSS-селекторам */
  },520);
}
function reopenGate(){
  const g=document.getElementById('gate');
  g.style.display='flex';
  g.classList.remove('hide');
  void g.offsetWidth;
  g.classList.add('anim');
}

let _searchTimer=null;
document.getElementById('search').addEventListener('input',()=>{
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(render,140);
});

function render(){
  const t=i18n[lang];
  const q=document.getElementById('search').value.trim().toLowerCase();
  const grid=document.getElementById('grid');
  let html='',shown=0,i=0;
  rules.forEach(rule=>{
    const title=rule.tt[lang]||rule.tt.uk;
    const typeOK=activeFilter==='all'||rule.items.some(x=>x.type===activeFilter);
    const inTitle=title.toLowerCase().includes(q);
    const inItems=q!==''&&rule.items.some(x=>(x.t[lang]+' '+x.p[lang]+' '+(x.sub||'')).toLowerCase().includes(q));
    if(!(typeOK&&(q===''||inTitle||inItems)))return;
    shown++;
    html+='<div class="rule-btn'+(i<12?' anim':'')+'" data-n="'+rule.num+'"'+(i<12?' style="animation-delay:'+(i*0.04)+'s"':'')+'><span class="num">'+rule.num+'</span><i class="ico fa-solid '+rule.icon+'"></i><span class="ttl">'+title+'</span></div>';i++;
  });
  grid.innerHTML=html;
  const e=document.getElementById('empty');
  e.textContent=t.empty;e.style.display=shown?'none':'block';
}
document.getElementById('grid').addEventListener('click',e=>{
  const b=e.target.closest('.rule-btn');if(!b)return;
  const rule=rules.find(r=>r.num==b.dataset.n);if(rule)openModal(rule);
});

let itemObserver=null;
function openModal(rule){
  const t=i18n[lang];
  document.getElementById('modalTitle').textContent=rule.num+'. '+(rule.tt[lang]||rule.tt.uk);
  let h='';
  if(rule.image)h+='<img class="map-img" src="'+rule.image+'" loading="lazy" decoding="async" alt="">';
  rule.items.forEach(x=>{
    if(activeFilter!=='all'&&x.type!==activeFilter)return;
    h+='<div class="item">'+(x.sub?'<h4>'+x.sub+'</h4>':'')+'<p>'+x.t[lang]+'</p><span class="penalty '+x.type+'">'+t.penalty+': '+x.p[lang]+'</span></div>';
  });
  const body=document.getElementById('modalBody');
  body.innerHTML=h;
  const scroller=document.querySelector('#modal .modal-scroll');
  scroller.scrollTop=0;
  const modal=document.getElementById('modal');
  modal.classList.add('show');
  requestAnimationFrame(()=>{ if(window.modalSliderUpdate)window.modalSliderUpdate(); });

  if(itemObserver)itemObserver.disconnect();
  const items=[...body.querySelectorAll('.item')];

  if(matchMedia('(prefers-reduced-motion:reduce)').matches || !('IntersectionObserver' in window)){
    items.forEach(it=>it.classList.add('in'));
    return;
  }

  itemObserver=new IntersectionObserver((entries,obs)=>{
    const vis=entries.filter(e=>e.isIntersecting)
                     .sort((a,b)=>a.boundingClientRect.top-b.boundingClientRect.top);
    vis.forEach((en,k)=>{
      en.target.style.animationDelay=(k*0.07).toFixed(2)+'s';
      en.target.classList.add('in');
      obs.unobserve(en.target);
    });
  },{root:scroller, threshold:0.06});

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    items.forEach(it=>itemObserver.observe(it));
  }));
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  if(itemObserver){itemObserver.disconnect();itemObserver=null;}
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

document.getElementById('filters').addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');activeFilter=chip.dataset.f;
  positionPill();render();
});

let _resizeTimer=null;
addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>positionPill(true),100);
});

/* Кастомный скроллбар модалки */
(function(){
  const slider=document.getElementById('mSlider');
  const thumb=document.getElementById('mThumb');
  const scroller=document.querySelector('#modal .modal-scroll');
  if(!slider||!thumb||!scroller)return;

  let _rafPending=false;
  function update(){
    if(_rafPending)return;
    _rafPending=true;
    requestAnimationFrame(()=>{
      _rafPending=false;
      const sh=scroller.scrollHeight, ch=scroller.clientHeight, st=scroller.scrollTop;
      const overflow=sh-ch;
      if(overflow<=4){slider.classList.remove('on');return;}
      slider.classList.add('on');
      const trackH=slider.clientHeight;
      const th=Math.max(40, trackH*ch/sh);
      const maxTop=trackH-th;
      const top=(st/overflow)*maxTop;
      thumb.style.height=th+'px';
      thumb.style.transform='translateY('+top+'px)';
    });
  }
  window.modalSliderUpdate=update;
  scroller.addEventListener('scroll',update,{passive:true});
  addEventListener('resize',update);

  let dragging=false,startY=0,startScroll=0;
  thumb.addEventListener('pointerdown',e=>{
    dragging=true;thumb.classList.add('drag');
    try{thumb.setPointerCapture(e.pointerId);}catch(_){}
    startY=e.clientY;startScroll=scroller.scrollTop;e.preventDefault();
  });
  thumb.addEventListener('pointermove',e=>{
    if(!dragging)return;
    const trackH=slider.clientHeight, th=thumb.offsetHeight;
    const overflow=scroller.scrollHeight-scroller.clientHeight;
    const maxTop=trackH-th;
    const ratio=maxTop? (e.clientY-startY)/maxTop : 0;
    scroller.scrollTop=startScroll+ratio*overflow;
  });
  function stop(){dragging=false;thumb.classList.remove('drag');}
  thumb.addEventListener('pointerup',stop);
  thumb.addEventListener('pointercancel',stop);
  slider.addEventListener('pointerdown',e=>{
    if(e.target===thumb)return;
    const rect=slider.getBoundingClientRect(), th=thumb.offsetHeight;
    const trackH=slider.clientHeight, maxTop=trackH-th;
    const overflow=scroller.scrollHeight-scroller.clientHeight;
    const ratio=Math.min(1,Math.max(0,(e.clientY-rect.top-th/2)/maxTop));
    scroller.scrollTo({top:ratio*overflow,behavior:'smooth'});
  });
})();
